<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CBJ Chess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #002654;
    --navy-deep: #001530;
    --blue: #0055a0;
    --blue-light: #1a77c9;
    --red: #ce1126;
    --silver: #a4b7c1;
    --silver-light: #d6e4ef;
    --sq-light: #d0dfe9;
    --sq-dark: #003a7a;
    --sq-selected: rgba(206,17,38,0.55);
    --sq-legal: rgba(0,0,0,0.20);
    --sq-check: rgba(206,17,38,0.65);
    --sq-last: rgba(255,220,0,0.30);
    --bg: #000e1f;
    --panel-bg: #001830;
    --panel-border: #0a3a6e;
    --text: #d6e4ef;
    --text-muted: #6a8eaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 900px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .logo {
    text-align: center;
    width: 100%;
    margin-bottom: 10px;
  }

  .cbj-cannon {
    font-size: 3rem;
    display: inline-block;
    margin-bottom: 4px;
    animation: cannon-rock 4s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(206,17,38,0.4));
  }

  @keyframes cannon-rock {
    0%, 100% { transform: rotate(-3deg) translateY(0); }
    50% { transform: rotate(3deg) translateY(-8px); }
  }

  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.06em;
    color: var(--silver-light);
    text-shadow: 0 0 30px rgba(206,17,38,0.5), 2px 2px 0 var(--navy-deep);
  }

  .logo h1 span { color: var(--red); }

  .board-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    border: 4px solid var(--navy);
    outline: 2px solid var(--red);
    outline-offset: 3px;
    box-shadow: 0 0 0 7px var(--navy-deep), 0 24px 80px rgba(0,0,0,0.8), 0 0 40px rgba(0,85,160,0.3);
    border-radius: 3px;
    overflow: hidden;
  }

  .sq {
    width: 70px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    cursor: pointer;
    position: relative;
    transition: filter 0.1s;
    user-select: none;
  }

  .sq.light { background: var(--sq-light); }
  .sq.dark { background: var(--sq-dark); }
  .sq.selected { background: var(--sq-selected) !important; }
  .sq.last-from, .sq.last-to { background: var(--sq-last) !important; }
  .sq.in-check { background: var(--sq-check) !important; }

  .sq.legal-move::after {
    content: '';
    position: absolute;
    width: 32%;
    height: 32%;
    border-radius: 50%;
    background: var(--sq-legal);
    pointer-events: none;
  }

  .sq.legal-capture::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 5px solid var(--sq-legal);
    border-radius: 0;
    pointer-events: none;
  }

  .sq:hover { filter: brightness(1.08); }
  .sq:hover .piece { transform: scale(1.06); }

  .piece {
    position: relative;
    z-index: 1;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.5));
    transition: transform 0.08s;
  }

  .coord-rank {
    position: absolute;
    bottom: 3px;
    left: 4px;
    font-size: 0.58rem;
    font-family: 'Share Tech Mono', monospace;
    pointer-events: none;
    opacity: 0.5;
  }

  .sq.light .coord-rank { color: var(--sq-dark); }
  .sq.dark .coord-rank { color: var(--sq-light); }

  .coord-file {
    position: absolute;
    top: 3px;
    right: 4px;
    font-size: 0.58rem;
    font-family: 'Share Tech Mono', monospace;
    pointer-events: none;
    opacity: 0.5;
  }

  .sq.light .coord-file { color: var(--sq-dark); }
  .sq.dark .coord-file { color: var(--sq-light); }

  .sidebar {
    width: 280px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .sidebar-header {
    border-bottom: 2px solid var(--red);
    padding-bottom: 12px;
  }

  .sidebar-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: var(--silver-light);
    letter-spacing: 0.1em;
  }

  .player-panel {
    background: rgba(0,85,160,0.1);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .player-panel.active-turn {
    background: rgba(206,17,38,0.15);
    border-color: var(--red);
  }

  .player-icon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
    border: 2px solid var(--panel-border);
  }

  .player-icon.white {
    background: var(--silver-light);
    border-color: var(--silver);
  }

  .player-icon.black {
    background: var(--navy-deep);
    border-color: var(--navy);
  }

  .player-info { flex: 1; }
  .player-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
  }

  .player-status {
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  .timer-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    color: var(--blue-light);
    min-width: 52px;
    text-align: right;
  }

  .timer-display.low { color: var(--red); animation: blink 0.8s ease-in-out infinite; }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    padding-bottom: 8px;
  }

  .move-list {
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
    padding: 8px;
    max-height: 120px;
    overflow-y: auto;
    font-size: 0.85rem;
    font-family: 'Share Tech Mono', monospace;
  }

  .move-row {
    display: grid;
    grid-template-columns: 26px 1fr 1fr;
    gap: 2px;
    padding: 2px 0;
  }

  .move-num { color: var(--text-muted); }
  .move-w { color: var(--silver-light); }
  .move-b { color: var(--blue-light); }

  .status-bar {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 12px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    color: var(--text);
    min-width: 280px;
  }

  .status-bar.check {
    border-color: var(--red);
    color: var(--red);
    background: rgba(206,17,38,0.08);
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn {
    padding: 10px;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--text);
    border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.1em;
    font-size: 0.9rem;
  }

  .btn:hover {
    border-color: var(--blue-light);
    color: var(--silver-light);
  }

  .btn.resign {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
  }

  .btn.resign:hover {
    background: #a50d1e;
    border-color: #a50d1e;
  }

  #promotion-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #promotion-modal.show { display: flex; }

  .promo-box {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-top: 3px solid var(--red);
    border-radius: 12px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.85);
  }

  .promo-box h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.15em;
    color: var(--silver-light);
  }

  .promo-pieces { display: flex; gap: 10px; }

  .promo-piece {
    width: 72px;
    height: 72px;
    border: 2px solid var(--panel-border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    cursor: pointer;
    transition: all 0.15s;
    background: rgba(255,255,255,0.03);
  }

  .promo-piece:hover {
    border-color: var(--red);
    background: rgba(206,17,38,0.1);
    transform: scale(1.1);
  }

  #gameover-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,5,20,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #gameover-modal.show { display: flex; }

  .gameover-box {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-top: 4px solid var(--red);
    border-radius: 14px;
    padding: 44px 52px;
    text-align: center;
    max-width: 380px;
    box-shadow: 0 30px 90px rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .gameover-box .go-icon { font-size: 3.5rem; }

  .gameover-box h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    letter-spacing: 0.1em;
    color: var(--silver-light);
  }

  .gameover-box .reason {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .gameover-box .winner-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    color: var(--blue-light);
  }

  .gameover-btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 6px;
  }

  .gameover-btn-row .btn {
    flex: 1;
  }

  @media (max-width: 860px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; }
    .sq { width: 50px; height: 50px; font-size: 32px; }
  }
</style>
</head>
<body>

<div class="logo">
  <span class="cbj-cannon">💥</span>
  <h1>CBJ <span>Chess</span></h1>
</div>

<div class="container">
  <div class="board-area">
    <div id="board"></div>
    <div class="status-bar" id="status-bar">White's Turn</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h2>⚡ Game Status</h2>
    </div>

    <div class="player-panel" id="white-panel" class="active-turn">
      <div class="player-icon white">♔</div>
      <div class="player-info">
        <div class="player-name">White</div>
        <div class="player-status">Your Turn</div>
      </div>
      <div class="timer-display" id="white-timer">10:00</div>
    </div>

    <div class="player-panel" id="black-panel">
      <div class="player-icon black">♚</div>
      <div class="player-info">
        <div class="player-name">Black</div>
        <div class="player-status">Waiting</div>
      </div>
      <div class="timer-display" id="black-timer">10:00</div>
    </div>

    <div class="section-label">Moves</div>
    <div class="move-list" id="move-list"></div>

    <div class="controls">
      <button class="btn" onclick="offerDraw()">½ Draw</button>
      <button class="btn resign" onclick="resign()">⚑ Resign</button>
    </div>
  </div>
</div>

<div id="promotion-modal">
  <div class="promo-box">
    <h3>Promote Pawn</h3>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<div id="gameover-modal">
  <div class="gameover-box">
    <div class="go-icon" id="gameover-icon">💥</div>
    <h2 id="gameover-title">Game Over</h2>
    <div class="reason" id="gameover-reason"></div>
    <div class="winner-text" id="gameover-winner"></div>
    <div class="gameover-btn-row">
      <button class="btn" onclick="location.reload()" style="flex:1">Play Again</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// CHESS ENGINE
// ════════════════════════════════════════════════════════════

const GLYPHS = {
  wK:'♔', wQ:'♕', wR:'♖', wB:'♗', wN:'♘', wP:'♙',
  bK:'♚', bQ:'♛', bR:'♜', bB:'♝', bN:'♞', bP:'♟',
};

const FILES = ['a','b','c','d','e','f','g','h'];

function initBoard() {
  const board = Array(8).fill(null).map(() => Array(8).fill(null));
  board[7] = ['wR','wN','wB','wQ','wK','wB','wN','wR'];
  board[6] = Array(8).fill('wP');
  board[1] = Array(8).fill('bP');
  board[0] = ['bR','bN','bB','bQ','bK','bB','bN','bR'];
  return board;
}

function gameState() {
  return {
    board: initBoard(),
    turn: 'w',
    castling: { wK: true, wQ: true, bK: true, bQ: true },
    enPassant: null,
    halfMove: 0,
    fullMove: 1,
    whiteTime: 600,
    blackTime: 600,
  };
}

function getLegalMoves(state, r, c) {
  const piece = state.board[r][c];
  if (!piece) return [];
  const color = piece[0];
  if (color !== state.turn) return [];

  const moves = [];
  const type = piece[1];

  if (type === 'P') moves.push(...getPawnMoves(state, r, c, color));
  else if (type === 'N') moves.push(...getKnightMoves(state, r, c, color));
  else if (type === 'B') moves.push(...getBishopMoves(state, r, c, color));
  else if (type === 'R') moves.push(...getRookMoves(state, r, c, color));
  else if (type === 'Q') moves.push(...getQueenMoves(state, r, c, color));
  else if (type === 'K') moves.push(...getKingMoves(state, r, c, color));

  return moves.filter(([tr, tc]) => !isKingInCheck(applyMove(state, r, c, tr, tc), color));
}

function getPawnMoves(state, r, c, color) {
  const dir = color === 'w' ? -1 : 1;
  const start = color === 'w' ? 6 : 1;
  const moves = [];

  const fr = r + dir;
  if (fr >= 0 && fr < 8 && !state.board[fr][c]) {
    moves.push([fr, c]);
    if (r === start && !state.board[r + 2*dir][c]) moves.push([r + 2*dir, c]);
  }

  for (const dc of [-1, 1]) {
    const nc = c + dc;
    if (nc >= 0 && nc < 8 && state.board[fr][nc]?.startsWith(color === 'w' ? 'b' : 'w')) {
      moves.push([fr, nc]);
    }
  }

  return moves;
}

function getKnightMoves(state, r, c, color) {
  const moves = [];
  const offsets = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
  for (const [dr, dc] of offsets) {
    const nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
      const target = state.board[nr][nc];
      if (!target || target[0] !== color) moves.push([nr, nc]);
    }
  }
  return moves;
}

function getBishopMoves(state, r, c, color) {
  const moves = [];
  for (const [dr, dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
    for (let i = 1; i < 8; i++) {
      const nr = r + dr*i, nc = c + dc*i;
      if (nr < 0 || nr >= 8 || nc < 0 || nc >= 8) break;
      const target = state.board[nr][nc];
      if (!target) moves.push([nr, nc]);
      else {
        if (target[0] !== color) moves.push([nr, nc]);
        break;
      }
    }
  }
  return moves;
}

function getRookMoves(state, r, c, color) {
  const moves = [];
  for (const [dr, dc] of [[0,-1],[0,1],[-1,0],[1,0]]) {
    for (let i = 1; i < 8; i++) {
      const nr = r + dr*i, nc = c + dc*i;
      if (nr < 0 || nr >= 8 || nc < 0 || nc >= 8) break;
      const target = state.board[nr][nc];
      if (!target) moves.push([nr, nc]);
      else {
        if (target[0] !== color) moves.push([nr, nc]);
        break;
      }
    }
  }
  return moves;
}

function getQueenMoves(state, r, c, color) {
  return [...getBishopMoves(state, r, c, color), ...getRookMoves(state, r, c, color)];
}

function getKingMoves(state, r, c, color) {
  const moves = [];
  for (const dr of [-1, 0, 1]) {
    for (const dc of [-1, 0, 1]) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
        const target = state.board[nr][nc];
        if (!target || target[0] !== color) moves.push([nr, nc]);
      }
    }
  }
  return moves;
}

function applyMove(state, fr, fc, tr, tc, promo = 'Q') {
  const newState = JSON.parse(JSON.stringify(state));
  const piece = newState.board[fr][fc];
  newState.board[tr][tc] = piece;
  newState.board[fr][fc] = null;

  if (piece[1] === 'P' && (tr === 0 || tr === 7)) {
    newState.board[tr][tc] = piece[0] + promo;
  }

  newState.turn = newState.turn === 'w' ? 'b' : 'w';
  newState.halfMove++;

  return newState;
}

function isKingInCheck(state, color) {
  const kingPiece = color + 'K';
  let kr = -1, kc = -1;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (state.board[r][c] === kingPiece) { kr = r; kc = c; }
    }
  }

  if (kr === -1) return false;

  const opColor = color === 'w' ? 'b' : 'w';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const piece = state.board[r][c];
      if (!piece || piece[0] !== opColor) continue;

      const tempState = { ...state, turn: opColor };
      const moves = getLegalMoves(tempState, r, c);
      if (moves.some(([tr, tc]) => tr === kr && tc === kc)) return true;
    }
  }
  return false;
}

function isCheckmate(state) {
  if (!isKingInCheck(state, state.turn)) return false;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (getLegalMoves(state, r, c).length > 0) return false;
    }
  }
  return true;
}

function isStalemate(state) {
  if (isKingInCheck(state, state.turn)) return false;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (getLegalMoves(state, r, c).length > 0) return false;
    }
  }
  return true;
}

// ════════════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════════════

let gs = gameState();
let selected = null;
let legalDests = [];
let lastMove = null;
let moveListData = [];
let gameActive = true;
let whiteTime = 600, blackTime = 600;
let gameTimer;

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const isLight = (r + c) % 2 === 0;
      const sq = document.createElement('div');
      sq.className = `sq ${isLight ? 'light' : 'dark'}`;
      sq.dataset.r = r;
      sq.dataset.c = c;

      if (lastMove && ((lastMove.fr === r && lastMove.fc === c) || (lastMove.tr === r && lastMove.tc === c))) {
        sq.classList.add(lastMove.fr === r && lastMove.fc === c ? 'last-from' : 'last-to');
      }

      if (selected && selected.r === r && selected.c === c) sq.classList.add('selected');

      if (legalDests.some(d => d[0] === r && d[1] === c)) {
        const piece = gs.board[r][c];
        sq.classList.add(piece ? 'legal-capture' : 'legal-move');
      }

      const piece = gs.board[r][c];
      if (piece) {
        const p = document.createElement('span');
        p.className = 'piece';
        p.textContent = GLYPHS[piece];
        sq.appendChild(p);
      }

      // Add king check highlight
      if (piece === 'wK' || piece === 'bK') {
        const color = piece[0];
        if (isKingInCheck(gs, color)) sq.classList.add('in-check');
      }

      // Coordinates
      if (c === 0) {
        const rank = document.createElement('span');
        rank.className = 'coord-rank';
        rank.textContent = 8 - r;
        sq.appendChild(rank);
      }
      if (r === 7) {
        const file = document.createElement('span');
        file.className = 'coord-file';
        file.textContent = FILES[c];
        sq.appendChild(file);
      }

      sq.addEventListener('click', () => onSquareClick(r, c));
      board.appendChild(sq);
    }
  }

  document.getElementById('white-panel').classList.toggle('active-turn', gs.turn === 'w');
  document.getElementById('black-panel').classList.toggle('active-turn', gs.turn === 'b');
}

function onSquareClick(r, c) {
  if (!gameActive) return;

  const piece = gs.board[r][c];

  if (selected) {
    const dest = legalDests.find(d => d[0] === r && d[1] === c);
    if (dest) {
      const selPiece = gs.board[selected.r][selected.c];
      if (selPiece[1] === 'P' && (r === 0 || r === 7)) {
        promptPromotion(selected.r, selected.c, r, c);
      } else {
        playMove(selected.r, selected.c, r, c);
      }
      selected = null;
      legalDests = [];
      renderBoard();
      return;
    }
    selected = null;
    legalDests = [];
  }

  if (piece && piece[0] === gs.turn) {
    selected = { r, c };
    legalDests = getLegalMoves(gs, r, c);
  }
  renderBoard();
}

function playMove(fr, fc, tr, tc, promo = 'Q') {
  const nextState = applyMove(gs, fr, fc, tr, tc, promo);
  lastMove = { fr, fc, tr, tc };
  gs = nextState;
  addMoveToList(fr, fc, tr, tc, promo);
  renderBoard();
  updateStatus();

  let over = false, winner = null, reason = null;
  if (isCheckmate(gs)) {
    over = true;
    winner = gs.turn === 'w' ? 'black' : 'white';
    reason = 'checkmate';
  } else if (isStalemate(gs)) {
    over = true;
    winner = null;
    reason = 'stalemate';
  }

  if (over) {
    gameActive = false;
    clearInterval(gameTimer);
    endGame(reason, winner);
  }
}

function addMoveToList(fr, fc, tr, tc, promo) {
  const piece = gs.board[tr][tc];
  const moveList = document.getElementById('move-list');
  const notation = buildNotation(fr, fc, tr, tc, piece, promo);

  if (gs.turn === 'b') {
    const num = Math.floor(moveListData.length / 2) + 1;
    moveListData.push({ color: 'w', notation, num });
    const row = document.createElement('div');
    row.className = 'move-row';
    row.innerHTML = `<span class="move-num">${num}.</span><span class="move-w">${notation}</span><span class="move-b"></span>`;
    moveList.appendChild(row);
  } else {
    moveListData.push({ color: 'b', notation });
    const rows = moveList.querySelectorAll('.move-row');
    if (rows.length) rows[rows.length - 1].querySelector('.move-b').textContent = notation;
  }
  moveList.scrollTop = moveList.scrollHeight;
}

function buildNotation(fr, fc, tr, tc, capturedPiece, promo) {
  const piece = gs.board[tr][tc];
  const type = piece[1];
  const toSq = FILES[tc] + (8 - tr);

  let n = type === 'P' ? '' : type;
  if (type === 'P' && capturedPiece) n += FILES[fc];
  if (capturedPiece) n += 'x';
  n += toSq;
  if (type === 'P' && (tr === 0 || tr === 7)) n += '=' + promo;

  return n;
}

function updateStatus() {
  const bar = document.getElementById('status-bar');
  const turn = gs.turn === 'w' ? 'White' : 'Black';
  if (isKingInCheck(gs, gs.turn)) {
    bar.textContent = `⚠ ${turn} is in Check`;
    bar.className = 'status-bar check';
  } else {
    bar.textContent = `${turn}'s Turn`;
    bar.className = 'status-bar';
  }
}

function promptPromotion(fr, fc, tr, tc) {
  const box = document.getElementById('promo-pieces');
  box.innerHTML = '';
  const color = gs.turn === 'w' ? 'w' : 'b';
  ['Q', 'R', 'B', 'N'].forEach(p => {
    const div = document.createElement('div');
    div.className = 'promo-piece';
    div.textContent = GLYPHS[color + p];
    div.onclick = () => {
      document.getElementById('promotion-modal').classList.remove('show');
      playMove(fr, fc, tr, tc, p);
    };
    box.appendChild(div);
  });
  document.getElementById('promotion-modal').classList.add('show');
}

function updateTimers() {
  document.getElementById('white-timer').textContent = formatTime(whiteTime);
  document.getElementById('black-timer').textContent = formatTime(blackTime);
  if (whiteTime <= 30) document.getElementById('white-timer').classList.add('low');
  if (blackTime <= 30) document.getElementById('black-timer').classList.add('low');
}

function formatTime(s) {
  return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
}

function startGameTimer() {
  gameTimer = setInterval(() => {
    if (gs.turn === 'w') whiteTime--;
    else blackTime--;
    updateTimers();
  }, 1000);
}

function offerDraw() {
  if (gameActive && confirm('Offer a draw?')) {
    if (confirm('Draw accepted?')) {
      gameActive = false;
      clearInterval(gameTimer);
      endGame('draw', null);
    }
  }
}

function resign() {
  if (!gameActive) return;
  if (confirm('Resign?')) {
    gameActive = false;
    clearInterval(gameTimer);
    const winner = gs.turn === 'w' ? 'black' : 'white';
    endGame('resign', winner);
  }
}

function endGame(reason, winner) {
  const reasonMap = {
    'checkmate': 'Checkmate',
    'stalemate': 'Stalemate – Draw',
    'draw': 'Draw',
    'resign': 'Resignation'
  };

  document.getElementById('gameover-reason').textContent = reasonMap[reason] || reason;

  if (!winner) {
    document.getElementById('gameover-title').textContent = 'Draw';
    document.getElementById('gameover-winner').textContent = '';
    document.getElementById('gameover-icon').textContent = '½';
  } else {
    document.getElementById('gameover-title').textContent = winner === 'white' ? 'White Wins!' : 'Black Wins!';
    document.getElementById('gameover-winner').textContent = `${winner[0].toUpperCase() + winner.slice(1)} Wins`;
    document.getElementById('gameover-icon').textContent = '🏆';
  }

  document.getElementById('gameover-modal').classList.add('show');
}

// Initialize
renderBoard();
updateStatus();
updateTimers();
startGameTimer();
</script>
